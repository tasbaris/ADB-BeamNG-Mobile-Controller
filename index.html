<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeamNG Pro Cockpit v3 (Classic Ergonomic)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #040406;
            --panel: linear-gradient(145deg, #12131c, #0a0a0f);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --danger: #ff2a2a;
            --warning: #ffb700;
            --safe: #00ff66;
            --border: #222333;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        /* TOP DASHBOARD */
        .dash-board {
            height: 110px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 0, 0, 0.5);
            position: relative;
            flex-shrink: 0;
        }

        .dash-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 30%;
        }

        .dash-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .dash-label {
            font-size: 14px;
            color: #666;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .gear-box {
            width: 80px;
            height: 80px;
            background: #000;
            border: 3px solid var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 55px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px var(--accent-glow);
        }

        .rpm-leds {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            padding: 5px 15px;
            background: #000;
            border: 2px solid var(--border);
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .led {
            width: 15px;
            height: 8px;
            border-radius: 2px;
            background: #222;
            transition: background 0.05s;
        }

        .led.g {
            background: var(--safe);
            box-shadow: 0 0 8px var(--safe);
        }

        .led.y {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        .led.r {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        /* INDICATORS & TEMPS */
        .indicators {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            font-weight: 900;
            color: #333;
            text-align: center;
        }

        .ind {
            transition: color 0.2s, text-shadow 0.2s;
        }

        .ind.active.abs {
            color: var(--warning);
            text-shadow: 0 0 8px var(--warning);
        }

        .ind.active.esc {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent);
        }

        .ind.active.check {
            color: var(--danger);
            text-shadow: 0 0 8px var(--danger);
        }

        .ind.active.brk {
            color: var(--danger);
            text-shadow: 0 0 8px var(--danger);
        }

        .temp-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
            margin: 0 10px;
        }

        .temp-label {
            font-size: 14px;
            color: #666;
            font-weight: 700;
            margin-top: -2px;
        }

        .temp-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        /* STATUS & FS */
        .sys-bar-left {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
        }

        .sys-bar-right {
            position: absolute;
            top: 3px;
            right: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 100;
        }

        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
        }

        .conn-dot.on {
            background: var(--safe);
            box-shadow: 0 0 8px var(--safe);
        }

        #fsBtn,
        #modeBtn {
            background: transparent;
            border: 1px solid #555;
            color: #888;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
        }

        #modeBtn {
            color: var(--accent);
            border-color: var(--accent);
            text-shadow: 0 0 5px var(--accent-glow);
        }

        /* MAIN CONTROLS (ERGONOMIC CLASSIC) */
        .main-stage {
            flex: 1;
            display: flex;
            gap: 15px;
            min-height: 0;
            /* Parent'ı esnek bırakır */
        }

        /* 3 COLUMN ERGONOMIC LAYOUT */
        .zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shift-zone {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
        }

        .left-zone {
            width: 18%;
        }

        .right-zone {
            width: 37%;
        }

        .center-box {
            flex: 1;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* SHIFT BUTTONS (Easy Thumb Reach) */
        .shift-btn {
            height: 55px;
            /* Başparmak için ideal yükseklik */
            flex: 1;
            background: linear-gradient(180deg, #1a1b26, #11121a);
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #ddd;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.1s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .shift-btn:active,
        .shift-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(0.95);
        }

        /* PEDALS (Tall for sliding thumb) */
        .pedals-right {
            flex: 1;
            display: flex;
            gap: 12px;
            min-height: 0;
        }

        .pedal-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-height: 0;
        }

        .pedal {
            flex: 1;
            background: #0a0a0f;
            border: 2px solid var(--border);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.8);
        }

        .pedal-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            opacity: 0.8;
            pointer-events: none;
            transition: height 0.05s;
        }

        .clutch-fill {
            background: linear-gradient(0deg, #2c3e50, #95a5a6);
        }

        .brake-fill {
            background: linear-gradient(0deg, #900, var(--danger));
        }

        .gas-fill {
            background: linear-gradient(0deg, #090, var(--safe));
        }

        .p-label {
            position: absolute;
            bottom: 15px;
            font-size: 16px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
        }

        .p-label.top {
            bottom: auto;
            top: 15px;
        }

        .val-label {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            font-family: 'Orbitron', sans-serif;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .version-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: #333;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .dev-credit-box {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .dev-credit-link {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            text-decoration: none;
            transition: color 0.3s;
            pointer-events: auto;
        }

        .dev-credit-link:hover {
            color: var(--accent);
        }

        /* CENTER BUTTONS */
        .center-col-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .action-btn {
            height: 40px;
            /* Basması kolay yükseklik */
            background: #111;
            border: 1px solid #444;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-weight: 900;
            font-size: 13px;
            transition: all 0.1s;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        .action-btn:active,
        .action-btn.active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .action-btn.nos {
            background: #2a0505;
            color: var(--danger);
            border-color: #500;
        }

        .action-btn.nos:active,
        .action-btn.nos.active {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px var(--danger);
        }

        /* SMALL WHEEL */
        .wheel-area-small {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1.2;
        }

        .wheel-graphic {
            width: 90px;
            height: 90px;
            border: 8px solid #222;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.05s linear;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            background: #111;
            border-radius: 50%;
            border: 2px solid #333;
        }

        .wheel-marker {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 18px;
            background: var(--accent);
            border-radius: 3px;
        }

        .sensor-btn {
            background: var(--accent);
            color: #000;
            font-weight: 900;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            width: 100%;
        }

        .dev-credit {
            position: absolute;
            left: 70px;
            top: -10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            text-decoration: none;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .dev-credit:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="dash-board">
        <div class="sys-bar-left">
            <a href="f1_wheel.html" id="modeBtn">F1 MODE</a>
            <a href="https://github.com/tasbaris" target="_blank" class="dev-credit">DEVELOPED BY TASBARIS</a>
        </div>
        <div class="sys-bar-right">
            <button id="fsBtn">⛶</button>
            <div class="conn-dot" id="ws-status"></div>
        </div>

        <div class="rpm-leds" id="led-strip">
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
            <div class="led"></div>
        </div>

        <div class="dash-section">
            <span class="dash-val" id="tele-speed">0</span>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <div
                    style="display: flex; justify-content: space-between; width: 70%; margin-top: 0; align-items: flex-end;">
                    <span class="dash-label" style="margin: 0;">KM/H</span>
                    <span class="dash-label" id="fuel-text"
                        style="margin: 0; color: var(--safe); font-size: 10px;">100%</span>
                </div>
                <div
                    style="width: 70%; height: 6px; background: #111; border-radius: 3px; margin-top: 2px; border: 1px solid #333; overflow: hidden; position: relative;">
                    <div id="fuel-bar"
                        style="height: 100%; width: 100%; background: var(--safe); box-shadow: 0 0 5px var(--safe); transition: width 0.1s linear;">
                    </div>
                </div>
            </div>
        </div>
        <div class="temp-box">
            <span class="temp-val" id="tele-oil">0</span>
            <span class="temp-label">OIL °C</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;margin-top:12px;">
            <div class="indicators">
                <span class="ind abs" id="ind-abs">ABS</span>
                <span class="ind esc" id="ind-esc">TCS</span>
            </div>

            <div class="gear-box" id="tele-gear">N</div>

            <div class="indicators">
                <span class="ind check" id="ind-chk">CHK</span>
                <span class="ind brk" id="ind-brk">BRK</span>
            </div>
        </div>
        <div class="temp-box">
            <span class="temp-val" id="tele-eng">0</span>
            <span class="temp-label">ENG °C</span>
        </div>
        <div class="dash-section">
            <span class="dash-val" id="tele-rpm" onclick="promptMaxRpm()" style="cursor: pointer;">0</span>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <div
                    style="display: flex; justify-content: space-between; width: 70%; margin-top: 0; align-items: flex-end;">
                    <span class="dash-label" id="lbl-rpm" style="margin: 0; cursor: pointer;">RPM</span>
                    <span class="dash-label" id="turbo-text"
                        style="margin: 0; color: var(--accent); font-size: 10px;">0.00 BAR</span>
                </div>
                <div
                    style="width: 70%; height: 6px; background: #111; border-radius: 3px; margin-top: 2px; border: 1px solid #333; overflow: hidden; position: relative;">
                    <div id="turbo-bar"
                        style="height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 5px var(--accent); transition: width 0.1s linear;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-stage">

        <!-- LEFT THUMB ZONE: Clutch -->
        <div class="zone left-zone">
            <div class="pedal-wrap">
                <div class="pedal" id="clutch-box">
                    <div class="pedal-fill clutch-fill" id="clutch-fill"></div>
                    <div class="p-label top">CLUTCH</div>
                </div>
                <div class="val-label" id="val-clutch">0.00</div>
            </div>
        </div>

        <!-- CENTER ZONE: Wheel & Secondary Buttons -->
        <div class="zone" style="flex: 1;gap:0;">
            <div class="center-box">
                <div class="center-col-btns">
                    <div class="action-btn" id="btnCam">🎥 CAM</div>
                    <div class="action-btn" id="btnLight">💡 LGT</div>
                    <div class="action-btn" id="btnESC">🛡️ ESC</div>
                </div>

                <div class="wheel-area-small">
                    <div class="wheel-graphic" id="wheel-img">
                        <div class="wheel-center"></div>
                        <div class="wheel-marker"></div>
                    </div>
                    <div class="val-label" id="val-steer">0.00</div>
                    <button class="sensor-btn" id="gyroBtn">ACTIVATE GYRO</button>
                    <div class="action-btn nos" id="btnNOS" style="width: 100%;">🔥 NITRO</div>
                </div>

                <div class="center-col-btns">
                    <div class="action-btn" id="btn4WD">⚙️ 4WD</div>
                    <div class="action-btn" id="btnStart">🔑 IGN</div>
                    <div class="action-btn" id="btnReset">↻ RST</div>
                </div>
            </div>
            <div class="val-label" style="opacity: 0.5; letter-spacing: 2px;">VERSION CODE: v2.2.0</div>
        </div>

        <!-- RIGHT THUMB ZONE: Shift Up & Brake/Gas -->
        <div class="zone right-zone">
            <div class="zone shift-zone">
                <div class="shift-btn" id="btnDown">SHIFT -</div>
                <div class="shift-btn" id="btnUp">SHIFT +</div>
            </div>
            <div class="pedals-right">
                <div class="pedal-wrap">
                    <div class="pedal" id="brake-box">
                        <div class="pedal-fill brake-fill" id="brake-fill" style="height:0%"></div>
                        <div class="p-label">BRAKE</div>
                    </div>
                    <div class="val-label" id="val-brake">0.00</div>
                </div>
                <div class="pedal-wrap">
                    <div class="pedal" id="gas-box">
                        <div class="pedal-fill gas-fill" id="gas-fill" style="height:0%"></div>
                        <div class="p-label">GAS</div>
                    </div>
                    <div class="val-label" id="val-gas">0.00</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // WebSocket Setup
        const ws = new WebSocket(`ws://${window.location.hostname}:8765`);
        const wsStatus = document.getElementById('ws-status');
        ws.onopen = () => wsStatus.classList.add('on');
        ws.onclose = () => wsStatus.classList.remove('on');

        // Telemetry Elements
        const tSpeed = document.getElementById('tele-speed');
        const tRpm = document.getElementById('tele-rpm');
        const tGear = document.getElementById('tele-gear');
        const tFuelText = document.getElementById('fuel-text');
        const tFuelBar = document.getElementById('fuel-bar');
        const tEng = document.getElementById('tele-eng');
        const tOil = document.getElementById('tele-oil');
        const leds = document.querySelectorAll('.led');

        const indAbs = document.getElementById('ind-abs');
        const indEsc = document.getElementById('ind-esc');
        const indChk = document.getElementById('ind-chk');
        const indBrk = document.getElementById('ind-brk');

        // Value Labels
        const valGas = document.getElementById('val-gas');
        const valBrake = document.getElementById('val-brake');
        const valClutch = document.getElementById('val-clutch');
        const valSteer = document.getElementById('val-steer');

        // State Tracking
        let steerOutput = 0, tiltOffset = 0, currentTilt = 0;
        let s = { gas: 0, brake: 0, clutch: 0, hb: 0, vU: 0, vD: 0, t: 0, r: 0, lgt: 0, esc: 0, fwd: 0, nos: 0, cam: 0 };
        let maxRpm = 4000; // Başlangıç taban devri (Otomatik artacak)

        function promptMaxRpm() {
            maxRpm = 4000; // Sıfırlama değeri
        }

        // Parse OutGauge Data
        ws.onmessage = (e) => {
            const p = e.data.split('|');
            if (p[0] === 'T') {
                tSpeed.innerText = p[1];
                tRpm.innerText = p[2];
                let g = parseInt(p[3]);

                if (g === 0) tGear.innerText = 'R';
                else if (g === 1) tGear.innerText = 'N';
                else tGear.innerText = (g - 1).toString();

                let rpm = parseInt(p[2]);

                // Otomatik Kalibrasyon: Görülen en yüksek RPM'i kaydet
                if (rpm > maxRpm) {
                    maxRpm = rpm;
                }

                // 12.1 çarpanı ile son LED sadece devir limitine tam yaklaşıldığında yanar
                let activeLeds = Math.min(12, Math.floor((rpm / maxRpm) * 12.1));

                const isRedline = (rpm / maxRpm) > 0.98;

                leds.forEach((led, i) => {
                    led.className = 'led';
                    if (i < activeLeds) {
                        if (i < 6) led.classList.add('g');
                        else if (i < 10) led.classList.add('y');
                        else {
                            // Last 2 LEDs flash at redline
                            if (isRedline) {
                                // Toggle class based on time for flashing effect
                                if (Math.floor(Date.now() / 50) % 2 === 0) led.classList.add('r');
                            } else {
                                led.classList.add('r');
                            }
                        }
                    }
                });

                let flags = parseInt(p[4]);
                indAbs.classList.toggle('active', (flags & 1024) !== 0);
                indEsc.classList.toggle('active', (flags & 16) !== 0);
                indChk.classList.toggle('active', (flags & 256) !== 0);
                indBrk.classList.toggle('active', (flags & 4) !== 0);

                let turboBar = document.getElementById('turbo-bar');
                let turboText = document.getElementById('turbo-text');
                if (turboBar && p.length > 5) {
                    let turboVal = parseFloat(p[5]);
                    let turboPct = Math.max(0, Math.min(100, (turboVal / 2.5) * 100));
                    turboBar.style.width = turboPct + '%';
                    if (turboText) turboText.innerText = turboVal.toFixed(2) + ' BAR';
                }

                if (p.length > 8) {
                    let fuelVal = parseInt(p[6]);
                    let engVal = parseInt(p[7]);
                    let oilVal = parseInt(p[8]);

                    tEng.innerText = engVal;
                    tOil.innerText = oilVal;

                    tFuelText.innerText = `${fuelVal}%`;
                    tFuelBar.style.width = fuelVal + '%';

                    tEng.style.color = engVal > 105 ? 'var(--danger)' : '#fff';
                    tOil.style.color = oilVal > 115 ? 'var(--danger)' : '#fff';

                    let fuelColor = fuelVal < 15 ? 'var(--danger)' : 'var(--safe)';
                    tFuelText.style.color = fuelColor;
                    tFuelBar.style.background = fuelColor;
                    tFuelBar.style.boxShadow = `0 0 5px ${fuelColor}`;
                }
            }
        };

        // Fullscreen
        document.getElementById('fsBtn').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        // Touch Pedal Setup
        function setupPedal(id, key, isInv) {
            const box = document.getElementById(id + '-box');
            const fill = document.getElementById(id + '-fill');
            let tid = null;

            const move = (t) => {
                const r = box.getBoundingClientRect();
                let pct = isInv ? (t.clientY - r.top) / r.height : (r.bottom - t.clientY) / r.height;
                pct = Math.max(0, Math.min(1, pct));
                s[key] = pct;

                fill.style.height = (pct * 100) + '%';

                if (isInv) {
                    fill.style.top = '0'; fill.style.bottom = 'auto';
                } else {
                    fill.style.bottom = '0'; fill.style.top = 'auto';
                }
            };

            const reset = () => {
                s[key] = 0; fill.style.height = '0%';
                tid = null;
            };

            box.addEventListener('touchstart', e => {
                e.preventDefault();
                tid = e.changedTouches[0].identifier;
                move(e.changedTouches[0]);

            }, { passive: false });
            box.addEventListener('touchmove', e => { e.preventDefault(); for (let t of e.changedTouches) if (t.identifier === tid) move(t); }, { passive: false });
            box.addEventListener('touchend', reset); box.addEventListener('touchcancel', reset);
        }

        setupPedal('gas', 'gas', false);
        setupPedal('brake', 'brake', false);
        setupPedal('clutch', 'clutch', true);

        // Button Setup
        function setupBtn(id, key) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', e => {
                e.preventDefault();
                s[key] = 1;
                el.classList.add('active');

            }, { passive: false });
            const up = (e) => { if (e) e.preventDefault(); s[key] = 0; el.classList.remove('active'); };
            el.addEventListener('touchend', up); el.addEventListener('touchcancel', up);
        }

        setupBtn('btnUp', 'vU'); setupBtn('btnDown', 'vD');
        setupBtn('btnStart', 't'); setupBtn('btnReset', 'r');
        setupBtn('btnLight', 'lgt'); setupBtn('btnESC', 'esc');
        setupBtn('btn4WD', 'fwd'); setupBtn('btnNOS', 'nos');
        setupBtn('btnCam', 'cam');

        // Gyroscope
        let isGyroActive = false;
        const gyroBtn = document.getElementById('gyroBtn');

        function gyroHandler(e) {
            let angle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
            let isLandscape = window.innerWidth > window.innerHeight;

            let raw = 0;
            if (isLandscape) {
                raw = (angle === -90 || angle === 270) ? e.beta : -e.beta;
            } else {
                raw = e.gamma;
            }

            currentTilt = raw;
            steerOutput = Math.max(-1, Math.min(1, (raw - tiltOffset) / 75 * -1));
            document.getElementById('wheel-img').style.transform = `rotate(${steerOutput * 180}deg)`;
        }

        function activateGyro() {
            window.addEventListener('deviceorientation', gyroHandler);
            isGyroActive = true;
            localStorage.setItem('gyroEnabled', 'true');
            gyroBtn.innerText = 'CLOSE GYRO';
            gyroBtn.style.borderColor = 'var(--danger)';
            gyroBtn.style.color = 'var(--danger)';
        }

        function deactivateGyro() {
            window.removeEventListener('deviceorientation', gyroHandler);
            isGyroActive = false;
            localStorage.setItem('gyroEnabled', 'false');
            steerOutput = 0;
            document.getElementById('wheel-img').style.transform = `rotate(0deg)`;
            gyroBtn.innerText = 'ACTIVATE GYRO';
            gyroBtn.style.borderColor = '#555';
            gyroBtn.style.color = '#000';
        }

        function toggleGyro() {
            if (!isGyroActive) {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(st => {
                        if (st === 'granted') activateGyro();
                    });
                } else {
                    activateGyro();
                }
            } else {
                deactivateGyro();
            }
        }

        gyroBtn.onclick = toggleGyro;

        if (localStorage.getItem('gyroEnabled') === 'true') {
            activateGyro();
        }

        // Data Loop
        let sendInterval = setInterval(() => {
            if (ws.readyState === 1) {
                let g = 0; if (s.vU) g = 1; else if (s.vD) g = -1;
                ws.send(`${s.gas.toFixed(2)}|${s.brake.toFixed(2)}|${s.clutch.toFixed(2)}|${steerOutput.toFixed(3)}|${g}|${s.t}|${s.r}|${s.hb}|${s.lgt}|${s.esc}|${s.fwd}|${s.nos}|${s.cam}`);
            }

            // Update value labels
            valGas.innerText = s.gas.toFixed(2);
            valBrake.innerText = s.brake.toFixed(2);
            valClutch.innerText = s.clutch.toFixed(2);
            valSteer.innerText = steerOutput.toFixed(2);
            if (valTilt) valTilt.innerText = Math.round(currentTilt) + '°';
        }, 15);

        window.onbeforeunload = () => {
            clearInterval(sendInterval);
            ws.close();
        };
    </script>
</body>

</html>
